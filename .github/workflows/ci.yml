name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # プロジェクト未セットアップの間はスキップして CI を緑に保つ
      - name: Check for package.json
        id: check
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "package.json not found — skipping lint and build"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
